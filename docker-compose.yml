version: '3.8'

services:

  # ===============================
  # POSTGRES
  # ===============================
  postgres:
    image: postgres:15
    container_name: pep_postgres
    restart: always
    environment:
      POSTGRES_USER: pep_admin
      POSTGRES_PASSWORD: pep_password
      POSTGRES_DB: pep_plus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pep_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===============================
  # REDIS
  # ===============================
  redis:
    image: redis:7
    container_name: pep_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===============================
  # API (NESTJS)
  # ===============================
  api:
    build: .
    container_name: pep_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

  # ===============================
  # BULL BOARD (FILA)
  # ===============================
  bull-board:
    image: deadly0/bull-board
    container_name: pep_bull_board
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  postgres_data: